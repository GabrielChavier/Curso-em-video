<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatacao de textos</title>
</head>
<body>
    <h1>Principais formatacoes de texto</h1>
    <h2>Negrito / Destaque</h2>
    <p> nessa frase temos um <b>termo em negrito /</b> usando a tag B</p>
    <p> nessa frase, tenho um <strong> termo em destaque</strong> usando a tag strong (semântica).</p>
    <h2>Italico / Ênfase</h2>
    <P> nessa frase, temos um <i>termo em italico</i> usando a tag I (nao semantica)
</body>
</html>
